# Completion Rules
# Conditional rules and triggers for completion reporting

name: Completion Rules
description: Conditional triggers for generating completion reports after phase-complete work
version: "1.0"

# These rules are gated to avoid unnecessary reports for small fixes.

triggers:
  after_phase_implementation:
    event: Phase implementation completed
    pre_verification:
      agent: debugger
      mandatory: true
      invocation: |
        Task(subagent_type="debugger", prompt="Verify phase {NN} implementation: check all features work, no errors, integrations functional")
    agent: phase-manager
    skill: completion-report
    mandatory: true
    output: "docs/reports/phase-{NN}-completion-report.md"
    description: Generate completion report after finishing a phase

  after_substantial_delivery:
    event: Substantial feature or milestone completed
    condition: "Cross-module impact, architecture change, or explicit documentation request"
    pre_verification:
      agent: debugger
      mandatory: false
      invocation: |
        Task(subagent_type="debugger", prompt="Verify substantial delivery {name}: validate functionality, test edge cases, check regressions")
    agent: phase-manager
    skill: completion-report
    mandatory: false
    output: "docs/reports/implementation-{name}-completion-report.md"
    description: Optional report for substantial non-phase work

# Activities that trigger completion reports
triggering_activities:
  - Phase implementation completed
  - Substantial feature or milestone completed (conditional)
  - Explicit user request for a completion report

# Agent reference: see project-lifecycle.yml for phase-manager definition
agent_ref: phase-manager

# Why these rules matter
rationale:
  - Documents what was accomplished for future reference
  - Captures lessons learned while context is fresh
  - Creates bridge to next phase or task
  - Ensures knowledge transfer and continuity
  - Provides audit trail for project history

# Enforcement
enforcement:
  level: conditional
  skip_allowed: true
  notes: |
    Completion reports are mandatory for completed phases only.
    For routine fixes and small scoped changes, skip report generation unless
    the user explicitly asks for documentation.

# Parallel execution patterns for post-implementation
parallel_patterns:
  post_feature:
    description: After implementing a feature
    steps:
      - agent: code-reviewer
        prompt: "Review the {feature} changes"
      - agent: test-expert
        prompt: "Write tests for the new {feature}"
    notes: Code review and testing can run in parallel

  post_phase:
    description: After completing phase planning
    steps:
      - agent: planner
        prompt: "Create implementation plan for phase {NN}"
      - agent: ui-designer
        prompt: "Generate UI prompts for phase {NN}"
    notes: Planning and UI design can run in parallel when specs are ready
