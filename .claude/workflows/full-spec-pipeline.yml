# Full Specification Pipeline
# Conditional pipeline for specification creation, validation, and clarification

name: Full Spec Pipeline
description: Pipeline that runs validation by default and clarification only when gaps are found
version: "1.0"

# This pipeline runs when spec-writer creates a full specification
trigger_on: spec-writer creates full specification

steps:
  - id: create-full-spec
    name: Create Full Specification
    agent: spec-writer
    skill: full-specs
    action: Create comprehensive full specification document
    output: "docs/{project-name}-full-spec.md"
    auto_continues: [validate-spec]

  - id: validate-spec
    name: Validate Specification
    agent: spec-writer
    skill: validate-full-specs
    action: Run simulation testing to identify gaps, vulnerabilities, and ambiguities
    requires: [create-full-spec]
    input: "docs/{project-name}-full-spec.md"
    output: "docs/reports/{project-name}-full-spec-validation-report.md"
    auto_continues: [verify-spec-completeness]
    auto_triggered: true

  - id: verify-spec-completeness
    name: Verify Specification Completeness
    agent: debugger
    action: Verify specification document is complete and consistent
    requires: [validate-spec]
    invocation: |
      Task(subagent_type="debugger", prompt="Verify specification completeness: check all required sections present, cross-references valid, no contradictions, technical feasibility confirmed")
    condition: "Spec is large/complex, high-risk domain, or user requested strict verification"
    auto_continues: [extract-issues]
    auto_triggered: false

  - id: extract-issues
    name: Extract Clarification Issues
    agent: spec-writer
    skill: issues-clarification
    action: Parse validation report and generate structured clarification questions
    requires_one_of:
      - path_a: [verify-spec-completeness]
        condition: "Completeness verification was executed"
      - path_b: [validate-spec]
        condition: "Completeness verification skipped"
    condition: "Validation artifacts indicate ambiguity, contradictions, or blockers"
    input: "docs/reports/{project-name}-full-spec-validation-report.md"
    output: "docs/reports/issues-for-clarification.md"
    auto_triggered: false

# Output artifacts produced by this pipeline
outputs:
  full_spec:
    path: "docs/{project-name}-full-spec.md"
    description: Complete project specification
    produced_by: create-full-spec

  validation_report:
    path: "docs/reports/{project-name}-full-spec-validation-report.md"
    description: Simulation test results identifying spec issues
    produced_by: validate-spec

  clarification_questions:
    path: "docs/reports/issues-for-clarification.md"
    description: Structured questions requiring user decisions
    produced_by: extract-issues

# Pipeline visualization
#
# ┌─────────────────────────────────────────────────────────────────┐
# │  FULL SPEC GENERATION PIPELINE (Validation default, gated next)│
# ├─────────────────────────────────────────────────────────────────┤
# │                                                                 │
# │  1. full-specs skill                                            │
# │     └─→ docs/{project-name}-full-spec.md                        │
# │                    │                                            │
# │                    ▼ [DEFAULT]                                  │
# │  2. validate-full-specs skill                                   │
# │     └─→ docs/reports/{project-name}-full-spec-validation-report.md │
# │                    │                                            │
# │                    ▼ [IF STRICT MODE OR COMPLEX SPEC]           │
# │  3. debugger verification                                       │
# │     └─→ Verify spec completeness and consistency                │
# │                    │                                            │
# │                    ▼ [IF GAPS FOUND]                            │
# │  4. issues-clarification skill                                  │
# │     └─→ docs/reports/issues-for-clarification.md                │
# │                                                                 │
# └─────────────────────────────────────────────────────────────────┘

# Agent reference: see project-lifecycle.yml for spec-writer definition
agent_ref: spec-writer

notes: |
  User invokes spec-writer once with a request to create a full spec.
  Validation runs by default; clarification runs only when issues are found.
  Strict completeness verification is optional and can be enabled explicitly.
