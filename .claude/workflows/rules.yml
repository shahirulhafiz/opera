# Global Rules
# Cross-cutting rules that apply to all workflows

name: Global Rules
description: Conventions and conditional guardrails for all agents
version: "1.0"

rules:
  docs_operations:
    description: Apply docs context checks for structural docs work
    applies_to: [spec-writer, planner, phase-manager, ui-designer]
    before: Creating, restructuring, or cross-linking docs artifacts
    action: Read docs/README.md and verify naming/location rules
    skip_when:
      - Small local edit in a known docs file
      - Read-only lookup with no structural docs changes

  naming_conventions:
    description: Consistent naming across all artifacts
    patterns:
      files: lowercase-with-hyphens
      phases: two-digit (01, 02, not 1, 2)
      paths: forward slashes, lowercase

  verification_with_debugger:
    description: Use debugger sub-agent only when risk or intent warrants deep verification
    applies_to: [implementer, phase-manager, test-expert]
    mandatory: false
    condition: "High-risk, cross-module, migration, external integration, error state, or explicit user verification request"
    triggers:
      - Before marking high-risk tasks as complete
      - Before phase completion handoff
      - After errors, crashes, or unexpected behavior
      - When user explicitly asks for deep verification
    user_request_keywords:
      - check
      - verify
      - validate
      - test
      - confirm
      - ensure
      - inspect
      - debug
      - diagnose
      - troubleshoot
    invocation: |
      Task(subagent_type="debugger", prompt="Verify: {description of what to verify}")
    rationale: |
      Debugger sub-agent provides systematic verification, catches errors early,
      and ensures quality gates are met before proceeding to next steps.

  user_requested_checks:
    description: Route explicit verification requests to debugger when scope requires diagnostic checks
    trigger: User request includes verification intent with clear target scope
    agent: debugger
    mandatory: false
    condition: "Request requires diagnostic verification beyond quick direct checks"
    invocation: |
      Task(subagent_type="debugger", prompt="{user's check request}")
    examples:
      - "check if the API works" → debugger verifies API functionality
      - "verify the database connection" → debugger tests DB connectivity
      - "validate the form inputs" → debugger checks input validation
      - "test the login flow" → debugger tests authentication flow

  completion_reports:
    description: Completion reports for phase-complete work or explicit documentation request
    trigger: After phase completion, substantial milestone, or explicit report request
    pre_verification:
      agent: debugger
      mandatory: false
      action: Verify changes before generating report
    agent: phase-manager
    skill: completion-report
    mandatory: false
    condition: "Phase is complete or user explicitly requests report output"

  exploration_policy:
    description: Budgeted exploration to reduce token/tool spikes
    defaults:
      mode: quick_discovery
      max_parallel_explore_agents: 1
      max_parallel_explore_agents_complex: 2
      max_tool_uses_per_explore_pass: 10
      max_files_read_initial_pass: 6
      require_scope_narrowing_after_initial_pass: true
      no_duplicate_file_reads_across_explore_agents: true
    escalation:
      stop_and_ask_on_budget_exceeded: true
      continue_only_if:
        - User explicitly requests deeper investigation
        - High-risk migration/debug scenario requires deeper analysis
    query_shape_routing:
      needle_query:
        strategy: direct tools only
        tools: [ReadFile, rg, Glob]
        avoid_subagent: true
      scoped_architecture_query:
        strategy: one explore agent quick pass
        max_parallel_agents: 1
      cross_system_query:
        strategy: two-phase exploration
        phase_1: quick_discovery
        phase_2: deep_discovery_if_gated
        max_parallel_agents_phase_2: 2
    reuse_and_dedupe:
      reuse_prior_results_same_turn: true
      reread_only_on_new_ambiguity: true
      prefer_signatures_then_selective_reads: true
