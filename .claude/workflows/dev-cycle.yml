# Development Cycle Workflow
# Lean iterative loop for feature/task delivery.
# Sits alongside project-lifecycle.yml (heavy phased governance) and reuses the same agents.

name: Development Cycle
description: Six-step iterative loop - planning, plan review, task breakdown, execution, code review, testing
version: "1.0"

# Harness mode: this workflow auto-runs. The primary agent orchestrates it without
# the user naming any agent or skill (see CLAUDE.md "Development Cycle Harness").
mode: auto
trigger:
  event: user requests a feature, change, or bug fix
  applies_when: multi-file or feature/bug work
  skip_when: trivial one-line or single-file edit (execute directly, Lean profile)
  delegation: automatic  # agents chosen by role; skills preload via each agent's skills: field

# Cycle:
#   planning → review plan → breakdown to details → execute → review code → testing
#              (loop back on REVISE)                         (loop back on failures)

steps:
  - id: planning
    name: Planning
    agent: planner
    skill: implementation-plan
    action: Draft an implementation plan from the spec or feature request
    type: auto
    output: "docs/plans/phase-{NN}-implementation-plan.md"
    auto_continues: [review-plan]

  - id: review-plan
    name: Review Plan
    agent: plan-reviewer
    skill: review-plan
    action: Audit the plan for spec coverage, feasibility, sequencing, and testability
    type: auto
    requires: [planning]
    input: "docs/plans/phase-{NN}-implementation-plan.md"
    on_complete:
      approve:
        next: task-breakdown
      approve_with_changes:
        next: task-breakdown
        action: Apply minor edits, then continue
      revise:
        next: planning
        action: Return blockers to planner and re-plan (max_retries 3)

  - id: task-breakdown
    name: Task Breakdown
    agent: planner
    skill: task-breakdown
    action: Expand the approved plan into granular, execution-ready tasks
    type: auto
    requires: [review-plan]
    output: "docs/plans/phase-{NN}-task-breakdown.md"
    auto_continues: [execute]

  - id: execute
    name: Execute
    agent: implementer
    skill: execute-plan
    action: Implement tasks in order, honoring dependencies and acceptance criteria
    type: auto
    requires: [task-breakdown]
    input: "docs/plans/phase-{NN}-task-breakdown.md"
    auto_continues: [review-code, testing]

  - id: review-code
    name: Review Code
    agent: code-reviewer
    action: Security and quality audit of the implemented changes (read-only)
    type: auto
    requires: [execute]
    parallel_with: [testing]

  - id: testing
    name: Testing
    agent: test-expert
    action: Write and run tests; reproduce bugs via tdd-repro before fixing
    type: auto
    requires: [execute]
    parallel_with: [review-code]

  # Conditional remediation loop - reuses project-lifecycle debugging behavior
  - id: fix-issues
    name: Fix Issues
    agent: debugger
    type: conditional
    condition: "review-code found issues or testing failed"
    triggers_on:
      - review-code.issues_found
      - testing.failed
    on_complete:
      success:
        next: review-code
        action: Re-run review and tests to confirm the fix
      failure:
        next: fix-issues
        action: Continue until resolved (max_retries 3)

# Loop-back rules
rules:
  - id: plan-gate
    description: Do not break down or execute a plan that is not approved
    condition: review-plan verdict is REVISE
    action: Loop back to planning; do not proceed to task-breakdown

  - id: green-before-done
    description: A cycle completes only when code review is clean and tests pass
    condition: review-code clean AND testing green
    action: Cycle complete; optionally hand off to phase-manager if a full phase finished

# Optional escalation into heavy governance (kept separate, not automatic)
escalation:
  to: project-lifecycle.yml
  when: A full phase or milestone is complete and a completion report is wanted
  agent: phase-manager
  mandatory: false

# Agent references: see project-lifecycle.yml for full agent definitions
agent_refs: [planner, plan-reviewer, implementer, code-reviewer, test-expert, debugger]

# Cycle visualization
#
#   ┌──────────┐   ┌─────────────┐   ┌────────────────┐   ┌─────────┐
#   │ planning │──▶│ review plan │──▶│ task breakdown │──▶│ execute │
#   └──────────┘   └──────┬──────┘   └────────────────┘   └────┬────┘
#        ▲                │ REVISE                              │
#        └────────────────┘                                    ▼
#                                        ┌─────────────┐   ┌─────────┐
#                                        │ review code │◀─▶│ testing │
#                                        └──────┬──────┘   └────┬────┘
#                                               │ issues/fail   │
#                                               ▼               │
#                                        ┌─────────────┐        │
#                                        │  fix-issues │────────┘
#                                        └─────────────┘
#                                               │ clean + green
#                                               ▼
#                                          Cycle complete